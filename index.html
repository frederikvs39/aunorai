<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aunór AI — kommer snart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #14100d;
      --bg-soft: #1d1813;
      --ink: #f3ece2;
      --accent: #d8a14a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(120% 90% at 50% -10%, var(--bg-soft) 0%, var(--bg) 55%);
      color: var(--ink);
      font-family: "Fraunces", serif;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      top: -20%; left: 50%;
      width: 70vmax; height: 70vmax;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(216,161,74,.14), transparent 60%);
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; padding: 24px; }
    .soon {
      font-size: .95rem;
      letter-spacing: .34em;
      text-transform: uppercase;
      font-weight: 400;
      opacity: 0;
      animation: rise .9s .1s ease forwards;
    }
    .name {
      margin-top: 18px;
      font-size: clamp(3rem, 13vw, 6.5rem);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -.01em;
      opacity: 0;
      animation: rise .9s .26s ease forwards;
    }
    .name span { color: var(--accent); font-style: italic; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="soon">Kommer snart</p>
    <h1 class="name">Aunór <span>AI</span></h1>
  </div>
</body>
</html>
